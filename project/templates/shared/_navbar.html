{% load static %}

<nav class="navbar-container">
    <a class="navbar-link" href="{% url 'main:mainpage' %}">DGU_likelion_14th</a>
    <a class="navbar-link" href="{% url 'main:secondpage' %}">Second Page</a>
    <a class="navbar-link" href="{% url 'main:postpage' %}">게시판</a>
    
    {% if user.is_authenticated %}
    <a class="navbar-link" href="{% url 'main:new_post' %}">새로운 post추가</a>
    {% endif %}

    <a class="navbar-link" href="{% url 'main:tag_list' %}">태그</a>
</nav>

<header class="header">
    <div class="header-left">
    </div>
    <div class="header-right">
        {% if user.is_authenticated %}
            <div>{{ user.username }}님 안녕하세요!</div>
            <div class="auth-links">
                <a href="{% url 'accounts:logout' %}">로그아웃</a>
                <a href="{% url 'users:mypage' request.user.id %}">마이페이지</a>
            </div>
        {% else %}
            <div class="auth-links">
                <a href="{% url 'accounts:login' %}">로그인</a>
                <a href="{% url 'accounts:signup' %}">회원가입</a>
            </div>
        {% endif %}
    </div>
</header>
