{% extends 'base.html' %}
{% load static %}
<div>
{% if user.is_authenticated %}
    <a href="{% url 'main:new_blog' %}">새 글 작성하기</a>
{% endif %}
</div>
{% block content %}
<link rel="stylesheet" href="{% static 'css/postpage.css' %}">

<div class="card-grid">
    {% for post in posts %}
        <div class="card">
            <div class="card-content">
                    <h2>{{ post.title }}</h2>
                    <span>학점: {{ post.grade }}</span>
                    <p>{{ post.summary }}</p>
                    <a href="{% url 'main:detail' post.id %}">자세히 보기</a>
                    <span>{{ post.pub_date }}</span>
            </div>
            </div>
            <div class="card-footer">
                <div class="divider"></div>
                 <span>{{ post.writer.profile.nickname }}</span>
            </div>
        </div>
    {% endfor %}
</div>
{% endblock %}
