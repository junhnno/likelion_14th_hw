{% extends 'base.html' %}
{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'css/postpage.css' %}">

<div class="card-grid">
    {% for post in posts %}
        <div class="card">
            <div class="card-content">
                <h2>{{ post.title }}</h2>
                <div class="card-header">
                    <span>학점: {{ post.grade }}</span>
                    <span>{{ post.writer }}</span>
                    <span>{{ post.pub_date }}</span>
                </div>
                <div class="divider"></div>
                <p class="card-summary">{{ post.summary }}</p>
            </div>

            <div class="card-footer">
                <div class="divider"></div>
                <a href="{% url 'main:detail' post.id %}">자세히 보기</a>
            </div>
        </div>
    {% endfor %}
</div>
{% endblock %}
