{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="form-wrapper">
    <form action="{% url 'main:update' post.id%}" method="POST">
        {% csrf_token %}
        <div class="form-title">블로그 글 수정</div>

        <div class="form-group">
            <label for="title">제목</label>
            <input type="text" id="title" name="title" value="{{ post.title }}" required>
        </div>

        <div class="form-group">
            <label for="content">내용</label>
            <textarea id="content" name="content" required>{{ post.content }}</textarea>
        </div>

        <div class="form-group">
    <label for="grade">학점</label>
    <select id="grade" name="grade">
        <option value="A+" {% if post.grade == 'A+' %}selected{% endif %}>A+</option>
        <option value="A0" {% if post.grade == 'A0' %}selected{% endif %}>A0</option>
        <option value="B+" {% if post.grade == 'B+' %}selected{% endif %}>B+</option>
        <option value="B0" {% if post.grade == 'B0' %}selected{% endif %}>B0</option>
        <option value="C+" {% if post.grade == 'C+' %}selected{% endif %}>C+</option>
        <option value="C0" {% if post.grade == 'C0' %}selected{% endif %}>C0</option>
        <option value="F" {% if post.grade == 'F' %}selected{% endif %}>F</option>
    </select>
</div>

        <div class="form-group">
            <label for="writer">작성자</label>
            <input type="text" id="writer" name="writer" value="{{ post.writer }}" required>
        </div>

        <div class="form-group">
            <label for="pub_date">작성일</label>
            <input type="date" id="pub_date" name="pub_date" value="{{ post.pub_date|date:'Y-m-d' }}" required>
        </div>

        <button type="submit">블로그 수정</button>
    </form>
</div>
{% endblock %}
